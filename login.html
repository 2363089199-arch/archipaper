<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArchiPaper · 登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
            background: #fafafa; color: #1a1a1a; line-height: 1.6;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 400px; max-width: 90vw;
            background: #fff; border-radius: 12px;
            padding: 40px 36px; box-shadow: 0 2px 20px rgba(0,0,0,0.06);
            border: 1px solid #e8e8e8;
        }
        .logo {
            font-size: 14px; font-weight: 700; letter-spacing: 0.5px;
            background: #1a1a1a; color: #fff; padding: 6px 14px;
            border-radius: 6px; display: inline-block; margin-bottom: 24px;
        }
        .title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
        .subtitle { font-size: 12.5px; color: #888; margin-bottom: 28px; }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block; font-size: 12px; font-weight: 600;
            color: #555; margin-bottom: 5px;
        }
        .form-input {
            width: 100%; padding: 10px 14px; border: 1.5px solid #e0e0e0;
            border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.2s;
            background: #fff; color: #1a1a1a;
        }
        .form-input:focus { border-color: #1a1a1a; }
        .form-input::placeholder { color: #bbb; }
        .btn {
            width: 100%; padding: 11px; border: none; border-radius: 8px;
            font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s;
            margin-top: 6px;
        }
        .btn-primary { background: #1a1a1a; color: #fff; }
        .btn-primary:hover { background: #333; }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
        .error {
            color: #ef4444; font-size: 12px; margin-bottom: 12px;
            min-height: 18px; display: none;
        }
        .error.show { display: block; }
        .switch {
            text-align: center; margin-top: 18px; font-size: 12.5px; color: #888;
        }
        .switch a { color: #1a1a1a; cursor: pointer; text-decoration: underline; font-weight: 600; }
        .divider {
            display: flex; align-items: center; margin: 20px 0; color: #ccc; font-size: 11px;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px; background: #e5e5e5;
        }
        .divider span { margin: 0 12px; }
        .skip-link {
            text-align: center; margin-top: 14px; font-size: 12px; color: #aaa;
        }
        .skip-link a { color: #aaa; cursor: pointer; text-decoration: none; }
        .skip-link a:hover { color: #1a1a1a; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">ArchiPaper</div>
    <div class="title" id="formTitle">欢迎回来</div>
    <div class="subtitle" id="formSub">登录你的账号，管理建筑 AI 论文</div>

    <div class="error" id="errorMsg"></div>

    <div class="form-group">
        <label>用户名</label>
        <input type="text" class="form-input" id="username" placeholder="输入用户名" autocomplete="username">
    </div>
    <div class="form-group">
        <label>密码</label>
        <input type="password" class="form-input" id="password" placeholder="输入密码" autocomplete="current-password">
    </div>
    <div class="form-group" id="confirmGroup" style="display:none">
        <label>确认密码</label>
        <input type="password" class="form-input" id="confirmPass" placeholder="再次输入密码" autocomplete="new-password">
    </div>

    <button class="btn btn-primary" id="submitBtn" onclick="handleSubmit()">登 录</button>

    <div class="switch">
        <span id="switchText">没有账号？</span> <a id="switchLink" onclick="toggleMode()">立即注册</a>
    </div>

    <div class="skip-link"><a onclick="skipLogin();return false" href="index.html">跳过登录，直接进入</a></div>
</div>

<script>
let mode = 'login';

function toggleMode() {
    mode = mode === 'login' ? 'register' : 'login';
    document.getElementById('formTitle').textContent = mode === 'login' ? '欢迎回来' : '创建账号';
    document.getElementById('formSub').textContent = mode === 'login' ? '登录你的账号，管理建筑 AI 论文' : '注册后即可管理你的论文集合';
    document.getElementById('submitBtn').textContent = mode === 'login' ? '登 录' : '注 册';
    document.getElementById('switchText').textContent = mode === 'login' ? '没有账号？' : '已有账号？';
    document.getElementById('switchLink').textContent = mode === 'login' ? '立即注册' : '去登录';
    document.getElementById('confirmGroup').style.display = mode === 'register' ? 'block' : 'none';
    document.getElementById('errorMsg').classList.remove('show');
}

function showError(msg) {
    var el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
}

function getUsers() {
    try { return JSON.parse(localStorage.getItem('archipaper_users') || '{}'); }
    catch(e) { return {}; }
}

function saveUsers(users) {
    localStorage.setItem('archipaper_users', JSON.stringify(users));
}

function handleSubmit() {
    var username = document.getElementById('username').value.trim();
    var password = document.getElementById('password').value.trim();
    var btn = document.getElementById('submitBtn');
    var errorEl = document.getElementById('errorMsg');
    errorEl.classList.remove('show');

    if (!username || !password) {
        showError('请填写用户名和密码');
        return;
    }

    if (username.length < 2) {
        showError('用户名至少 2 个字符');
        return;
    }

    if (password.length < 3) {
        showError('密码至少 3 位');
        return;
    }

    var users = getUsers();

    if (mode === 'register') {
        var confirm = document.getElementById('confirmPass').value.trim();
        if (password !== confirm) {
            showError('两次密码不一致');
            return;
        }
        if (users[username]) {
            showError('用户名已存在');
            return;
        }
        users[username] = btoa(password); // 简单编码存储
        saveUsers(users);
        doLogin(username);
    } else {
        if (!users[username]) {
            showError('用户名不存在');
            return;
        }
        if (users[username] !== btoa(password)) {
            showError('密码错误');
            return;
        }
        doLogin(username);
    }
}

function doLogin(username) {
    localStorage.setItem('archipaper_logged_in', 'true');
    localStorage.setItem('archipaper_current_user', username);
    window.location.href = 'index.html';
}

function skipLogin() {
    localStorage.setItem('archipaper_logged_in', 'true');
    localStorage.setItem('archipaper_current_user', '访客');
    // 优先用 replace 避免浏览器历史问题
    window.location.replace('index.html');
}

// 回车提交
var passEl = document.getElementById('password');
passEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleSubmit();
});
var confirmEl = document.getElementById('confirmPass');
confirmEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleSubmit();
});
var userEl = document.getElementById('username');
userEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('password').focus();
});
</script>
</body>
</html>
